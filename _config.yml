# Dataset configuration
data_path: ./data
dataset: CIFAR10
num_classes: 10
image_size: 32

# Federated learning settings
num_clients: 10
clients_per_round: 5
local_epochs: 5
batch_size: 64
learning_rate: 0.01
weight_decay: 0.0001
momentum: 0.9
rounds: 100

# Gradient Score Network (GSN) settings
gsn_hidden_size: 128
gsn_layers: 2
residual_feedback: true

# Sparse communication
sparsity_ratio: 0.1
count_sketch_k: 4
count_sketch_m: 256

# Privacy-preserving
enable_masking: true
enable_ahe: true
ahe_key_size: 2048
quantization_scale: 1e4

# Server aggregation
historical_window: 5
anomaly_threshold: 0.3

# Training settings
device: cuda
seed: 42
log_interval: 10
save_model: true
save_path: ./checkpoints

# Evaluation
evaluate_every: 5
metrics: [AUC, Macro-F1]